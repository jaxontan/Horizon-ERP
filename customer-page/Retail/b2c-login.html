<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>EspressGo — Retail Shopper Gateway</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/components/tailwind-config.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols Outlined (self-hosted via jsDelivr CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/material-symbols@0.27.0/outlined.css" rel="stylesheet" />
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fff8f0;
            color: #2b1810;
        }
        .header-font {
            font-family: 'Outfit', sans-serif;
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        .mono-card {
            background: #ffffff;
            border: 1px solid rgba(212, 165, 116, 0.35);
            box-shadow: 0 4px 20px rgba(194, 65, 12, 0.06);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .premium-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .premium-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: 0.5s;
        }
        .premium-btn:hover::before {
            left: 100%;
        }
    </style>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qsobpenorlpzlkeyiefg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzb2JwZW5vcmxwemxrZXlpZWZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NDMwOTEsImV4cCI6MjA5MjMxOTA5MX0.RBJsOWvF0vfX_e6q_y2zpzvBKh_PA73cZ55I7CAm8M4';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function signOutAll() {
            // Clear the server-cookie session AND any legacy Supabase SDK
            // session so subsequent reloads land on the login form.
            try {
                await fetch('/api/session/logout', { method: 'POST', credentials: 'same-origin' });
            } catch (_) { /* network failure is fine */ }
            await supabaseClient.auth.signOut().catch(() => {});
            window.location.reload();
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const btn = document.getElementById('sign-out-btn');
            // Surface the sign-out button when either transport has a session.
            let hasSession = false;
            try {
                const resp = await fetch('/api/session/me', {
                    method: 'GET',
                    credentials: 'same-origin',
                    cache: 'no-store',
                });
                if (resp.ok) {
                    const data = await resp.json().catch(() => ({}));
                    hasSession = Boolean(data?.session);
                }
            } catch {
                hasSession = false;
            }
            if (!hasSession) {
                const { data: { session } } = await supabaseClient.auth.getSession();
                hasSession = Boolean(session);
            }
            if (hasSession) {
                btn.classList.remove('hidden');
                btn.addEventListener('click', signOutAll);
            }
        });
    </script>
</head>

<body class="font-customer-body antialiased flex flex-col min-h-screen relative selection:bg-[#c2410c] selection:text-white">

    <!-- Absolute minimalist ambient grid -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(194,65,12,0.10),rgba(0,0,0,0))] pointer-events-none z-0"></div>
    <div class="absolute inset-0 bg-[linear-gradient(to_right,rgba(212,165,116,0.10)_1px,transparent_1px),linear-gradient(to_bottom,rgba(212,165,116,0.10)_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_0%,#fff_70%,transparent_100%)] pointer-events-none z-0"></div>

    <!-- Navigation Bar -->
    <nav class="relative z-10 px-8 lg:px-16 h-20 flex items-center justify-between border-b border-[#d4a574]/40 backdrop-blur-md bg-[#fff8f0]/80">
        <a href="../index.html" class="flex items-center gap-4 group">
            <div class="w-10 h-10 rounded-full border border-[#d4a574]/50 flex items-center justify-center text-[#c2410c] bg-[#fef3e2] transition-all duration-300 group-hover:bg-white group-hover:text-black">
                <span class="material-symbols-outlined text-xl font-headline-sm">arrow_back</span>
            </div>
            <div>
                <span class="font-extrabold text-sm header-font text-[#2b1810] tracking-widest block uppercase">Back to Gateway</span>
                <span class="text-[9px] text-[#8b4513] font-bold uppercase tracking-widest block mt-0.5">EspressGo Selection</span>
            </div>
        </a>

        <div class="flex items-center gap-3">
            <button id="sign-out-btn" class="hidden px-3 py-1.5 rounded-full bg-red-50 border border-red-200 text-red-700 hover:bg-red-100 text-[9px] font-bold uppercase tracking-widest transition-all">
                Sign Out
            </button>
            <div class="w-10 h-10 rounded-full border border-[#d4a574]/50 bg-[#fef3e2] flex items-center justify-center text-[#c2410c]">
                <span class="material-symbols-outlined text-lg">shopping_cart</span>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="relative z-10 flex-1 max-w-md mx-auto w-full px-6 py-16 flex flex-col justify-center">
        
        <!-- Selection Card -->
        <div class="mono-card rounded-3xl p-8 space-y-8 relative overflow-hidden">

            <div class="space-y-3 text-center">
                <div class="inline-flex px-3 py-1 bg-[#fef3e2] border border-[#d4a574]/60 rounded-full text-[9px] font-extrabold uppercase tracking-widest text-[#c2410c]">
                    B2C Retail Experience
                </div>
                <h2 class="text-3xl font-headline-lg font-extrabold header-font text-[#2b1810] uppercase tracking-tight">Retail Shopper</h2>
                <p class="text-xs text-[#6b4423] font-normal max-w-xs mx-auto leading-relaxed">
                    Create a new account to shop, or sign in to your existing retail account.
                </p>
            </div>

            <div class="space-y-4 pt-2">
                <!-- Button 1: Create New Account -->
                <a href="b2c.html" class="premium-btn w-full py-4 bg-[#c2410c] hover:bg-[#9a330a] text-white rounded-2xl text-xs font-bold uppercase tracking-widest transition-all duration-300 shadow-lg shadow-[#c2410c]/30 active:scale-[0.98] flex items-center justify-center gap-2 block">
                    <span class="material-symbols-outlined text-sm">person_add</span>
                    <span>Create New Account</span>
                </a>

                <!-- Button 2: Sign In -->
                <a href="b2c.html" onclick="localStorage.setItem('espressgo-show-login','1');return true;" class="premium-btn w-full py-4 bg-[#fef3e2] border border-[#d4a574]/60 hover:border-[#c2410c] hover:bg-[#fde7c8] text-[#2b1810] rounded-2xl text-xs font-bold uppercase tracking-widest transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-2 block">
                    <span class="material-symbols-outlined text-sm">login</span>
                    <span>Sign In</span>
                </a>
            </div>


            
        </div>

    </main>

    <!-- Visual Footer -->
    <footer class="relative z-10 text-center text-[9px] font-bold text-[#8b4513] uppercase tracking-widest py-10 mt-auto border-t border-[#d4a574]/40 bg-[#fff8f0]">
        <span>&copy; 2026 EspressGo Coffee Roasters. Retail Shopper Experiences.</span>
    </footer>
</body>
</html>
